version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-resume-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - h2-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - resume-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-resume-frontend
    depends_on:
      - backend
    networks:
      - resume-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ai-resume-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - resume-network

volumes:
  h2-data:

networks:
  resume-network:
    driver: bridge
