spring:
  datasource:
    url: jdbc:h2:mem:ai-resume-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  flyway:
    enabled: false

logging:
  level:
    com.ai.resume: DEBUG
    org.hibernate.SQL: DEBUG
